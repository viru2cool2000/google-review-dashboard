name: Google Review Dashboard

on:
workflow_dispatch:

jobs:
reviews:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install Packages
    run: pip install requests pandas openpyxl

  - name: Run Tracker
    run: python tracker.py
```
